name: first-workflow
on: push

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 18

      - name: install dependencies
        run: npm install
        working-directory: ./02 Starting Project

      - name: run tests
        run: npm test
        working-directory: ./02 Starting Project
  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v6
        with:
          node-version: 18
      - name: install dependencies
        run: npm install
        working-directory: ./02 Starting Project
      - name: build
        run: npm run build
        working-directory: ./02 Starting Project
      - name: print message
        run: echo "deploying......."